# ============================================================
# 以图搜商品系统 · 生产配置 · v1.3 生产加固
# 对齐: BRD v4.0.1 / 系统设计 v1.2 / 技术架构 v1.3
# ============================================================

# ── 配置服务 (v1.3 新增) ──
# 支持 K8s ConfigMap/Secret 和 Nacos 配置中心
# 所有中间件连接参数均通过配置服务获取
config_service:
  backend: k8s                       # k8s | nacos | env
  k8s:
    config_dir: /etc/config          # ConfigMap 挂载目录
    secret_dir: /etc/secrets         # Secret 挂载目录 (pg_password, redis_password 等)
  nacos:
    server_addr: ""                  # e.g. "nacos.internal:8848"
    namespace: ""                    # 命名空间 ID
    group: "image-search"
    data_id: "image-search-config"
    long_poll_timeout_ms: 30000
  # 敏感参数通过以下方式提供 (优先级从高到低):
  #   1. 环境变量: IMGSRCH_SECRET_PG_PASSWORD, IMGSRCH_SECRET_REDIS_PASSWORD 等
  #   2. K8s Secret: /etc/secrets/pg_password, /etc/secrets/redis_password 等
  #   3. Nacos 加密配置
  secrets:
    pg_password: "${PG_PASSWORD}"
    redis_password: "${REDIS_PASSWORD}"
    milvus_token: "${MILVUS_TOKEN}"
    kafka_user: "${KAFKA_USER}"
    kafka_password: "${KAFKA_PASSWORD}"
    api_keys_hashes: ""              # SHA256 hash CSV, FIX #6

system:
  version: "1.3.0"
  env: production
  cluster_id: "imgsrch-prod-01"

# ── 两区架构参数 ──
zones:
  hot:
    description: "热区 HNSW (近5月 + 常青)"
    months: 5
    index_type: HNSW
    params:
      M: 24                         # v4.0 从32调至24 (内存优化)
      efConstruction: 200
    search_params:
      ef_search: 256                # v4.1 从192调至256 (召回率优先)
      ef_search_s1: 192             # S1 降级 — 保持较高召回
      ef_search_s2: 96              # S2 降级
    estimated_vectors: 750_000_000  # ~7.5亿
    sla: "99.99%"
    replicas: 3

  non_hot:
    description: "非热区 DiskANN (6-18月)"
    months_start: 6
    months_end: 18
    index_type: DISKANN
    params:
      max_degree: 64                # MD
      search_list_size: 200         # SL
      pq_code_budget_gb: 30
    estimated_vectors: 2_200_000_000  # ~22亿 (滚动19.5亿 + 常青≤3亿)
    sla: "99.5%"
    replicas: 2

  evergreen:
    max_count: 300_000_000          # 3亿硬上限
    green_threshold: 250_000_000
    yellow_threshold: 280_000_000
    min_retention_years: 2
    ts_month_value: 999999

# ── 检索引擎 ──
search:
  # 双路径延迟模型 (v4.1 召回率优先)
  dual_path:
    fast_path:
      p99_target_ms: 350            # v4.1 从240调至350 (容忍延迟换召回)
      traffic_ratio: 0.65           # v4.1 更多请求走级联路径
    cascade_path:
      p99_target_ms: 550            # v4.1 从400调至550
      traffic_ratio: 0.35           # v4.1 从20%提升至35%
      trigger_threshold: 0.65       # v4.1 从0.80降至0.65 (更积极触发非热区搜索)
      timeout_ms: 350               # v4.1 从250调至350

  # ANN 检索
  ann:
    coarse_top_k: 3000              # v4.1 从2000扩至3000 (召回率优先)
    hot_timeout_ms: 200             # v4.1 从150调至200 (容忍更高延迟换召回)
    non_hot_timeout_ms: 350         # v4.1 从250调至350

  # Stage 1.5: 标签召回 (v4.1 召回率优先)
  tag_recall:
    enabled: true
    idf_top_k: 8                    # v4.1 从5调至8 (更多标签覆盖)
    timeout_ms: 20                  # v4.1 从10调至20 (容忍更高延迟)
    inverted_top_k: 1000            # v4.1 从500调至1000

  # Refine 精排 (v4.1 召回率优先)
  refine:
    top_k: 3000                     # v4.1 从2000扩至3000 (匹配 coarse_top_k)
    top_k_s1: 2000                  # v4.1 S1 保持较高精排池
    top_k_s2: 800                   # v4.1 S2 从500调至800
    use_float32: true

  # Fallback (v4.1 召回率优先: 更积极触发多路召回)
  fallback:
    score_threshold: 0.70           # v4.1 从0.80降至0.70 (更积极触发)
    sub_image_top_k: 500            # v4.1 从200扩至500
    tag_top_k: 500                  # v4.1 从200扩至500
    enabled: true

  # 融合排序权重
  fusion:
    weight_global: 0.40
    weight_sub: 0.30
    weight_tag: 0.20
    weight_cat: 0.10

  # 置信度阈值
  confidence:
    high_score: 0.75
    high_min_count: 10
    medium_score: 0.50

  # 响应
  response:
    max_top_k: 200
    default_top_k: 100
    default_time_range: "9m"
    default_data_scope: "all"

# ── 写入引擎 ──
write:
  # 写入可见性目标 (v4.0 三倍压缩)
  visibility:
    level1_p95_s: 5                 # 批量写入可查 (原15s)
    level2_p95_s: 10                # 已有图商家可见 (原30s)
    level3_p95_s: 15                # 新图全部可见 (原45s)

  download:
    timeout_s: 3
    retries: 2
    max_size_mb: 10
    user_agent: "SZWEGO-ImageSearch/1.2"

  dedup:
    redis_ttl_days: 90
    lock_ttl_s: 30

  feature:
    batch_size: 8
    timeout_s: 5
    max_sub_images: 5

  kafka:
    merchant_events_topic: "image-search.merchant-events"
    search_logs_topic: "image-search.search-logs"
    behavior_events_topic: "image-search.behavior-events"
    acks: 1
    linger_ms: 5                    # v4.0 从10ms降至5ms (可见性加速)
    batch_size: 65536

  # Flink 窗口 (v4.0)
  flink_window_s: 1                 # v4.0 从5s降至1s (可见性加速)

# ── 商家过滤 ──
bitmap_filter:
  grpc:
    port: 50051
    max_concurrent_requests: 200
    timeout_ms: 8

  rocksdb:
    block_cache_gb: 8
    bloom_filter_bits: 10
    compression: lz4
    write_buffer_mb: 128

  # PushUpdate 直推 (v4.0 写入可见性)
  push_update:
    enabled: true
    target_latency_ms: 50

  cdc:
    consumer_group: "bitmap-filter-cdc"
    batch_size: 500
    commit_interval_ms: 1000

# ── 降级配置 (v1.3: 支持配置服务动态调整) ──
# FIX #13: 所有阈值可通过配置服务 / Nacos 运行时修改, 无需重启
degrade:
  s0_s1:
    p99_threshold_ms: 600           # v4.1 从450调至600 (容忍更高延迟保召回)
    duration_s: 180                 # v4.1 从120调至180 (更慎重进入降级)
    error_rate_threshold: 0.001     # v4.1 从0.0005调至0.001

  s0_s2:
    p99_threshold_ms: 1000          # v4.1 从800调至1000
    duration_s: 60                  # v4.1 从30调至60
    error_rate_threshold: 0.02      # v4.1 从0.01调至0.02

  recovery:
    s1_dwell_s: 300
    s2_dwell_s: 600
    s3_observe_s: 600
    s3_cooldown_s: 900
    s3_ramp_stages: [0.1, 0.5, 1.0]

  # 穿透率监控 (v4.0.1 Patch #2)
  cascade_monitor:
    penetration_rate_alert: 0.30    # >30% 触发架构评审
    alert_sustain_days: 7

# ── 合作方约束 (v4.0.1 Patch #3) ──
partner:
  min_timeout_ms: 500               # 合作方 timeout ≥500ms 强制

# ── 限流 ──
rate_limit:
  global_search_qps: 500
  global_search_burst: 800
  per_caller_search_qps: 50
  per_caller_write_qps: 100
  unscoped_search_qps: 10

# ── 基础设施连接 (v1.3: 通过配置服务提供, 支持重试) ──
# 以下为默认值, 实际连接参数由配置服务 / K8s Secret 覆盖
reliability:
  # FIX #1: 连接初始化重试策略
  init_retry:
    max_retries: 5
    base_delay_s: 1.0
    max_delay_s: 30.0
  # FIX #2: 有界线程池 (Milvus SDK 同步调用专用)
  milvus_executor:
    max_workers: 32                  # = max(8, workers × 4)
    thread_name_prefix: "milvus-io"
  # FIX #4: 分布式锁
  distributed_lock:
    ttl_s: 30
    watchdog_renewal_interval_ratio: 0.333  # ttl / 3

milvus:
  host: "milvus-proxy.internal"
  port: 19530
  pool_size: 16
  token: "${MILVUS_TOKEN}"
  hot_collection: "global_images_hot"
  non_hot_collection: "global_images_non_hot"
  sub_collection: "sub_images"

postgres:
  host: "pg-primary.internal"
  port: 5432
  database: "image_search"
  user: "${PG_USER}"
  password: "${PG_PASSWORD}"
  pool_min: 5
  pool_max: 20
  ssl: true

redis:
  host: "redis-sentinel.internal"
  port: 26379
  sentinel_master: "mymaster"
  password: "${REDIS_PASSWORD}"
  db: 0

kafka:
  bootstrap_servers: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
  security_protocol: "SASL_PLAINTEXT"
  sasl_mechanism: "SCRAM-SHA-256"
  sasl_username: "${KAFKA_USER}"
  sasl_password: "${KAFKA_PASSWORD}"

clickhouse:
  host: "clickhouse.internal"
  port: 9000
  database: "image_search"

# ── 特性开关 ──
feature_flags:
  enable_fallback: true
  enable_sub_image_search: true
  enable_tag_search: true
  enable_behavior_report: true
  enable_bitmap_filter: true
  enable_refine: true
  enable_video_write: true
  enable_cascade_path: true         # v4.0 级联路径总开关
  enable_push_update: true          # v4.0 PushUpdate 直推
  enable_tag_recall_stage: true     # v4.0 Stage 1.5
  enable_sub_image_parallel: true   # v1.4 子图必备并行 (非 fallback)
  enable_batch_search: true         # v1.4 批量搜索 SSE
  enable_tag_search_endpoint: true  # v1.4 标签搜索独立入口

# ── SVIP 分区配置 (v1.4 新增) ──
svip:
  threshold_images: 10_000_000      # 商家图片量 ≥ 1000万 进入 SVIP
  demotion_threshold: 5_000_000     # 降至 500万以下退出 SVIP
  max_merchants_per_pool: 16        # 每个 SVIP 月分区池最多容纳 16 个 SVIP
  roster_cache_ttl_s: 3600          # 路由表 Redis 缓存 TTL

# ── 自适应搜索策略 (v1.4 新增) ──
adaptive_search:
  brute_force_pk_limit: 1_000_000   # pk 列表 ≤100万时走暴力搜索
  merchant_count_cache_ttl_s: 300   # 商家图片计数缓存 TTL

# ── 向量缓存 (v1.4 新增, 暴力搜索场景) ──
vector_cache:
  l1_max_merchants: 500             # 进程内 LRU 缓存商家数
  l2_redis_max_merchants: 5000      # Redis 缓存商家数
  ttl_s: 300                        # 缓存 TTL (写入可见性 3min + 裕量)

# ── 批量搜索 (v1.4 新增) ──
batch_search:
  max_images: 7                     # 单次最多 7 张
  stream_type: sse                  # 流式返回类型

# ── 匹配层级阈值 (v1.4 新增) ──
match_level:
  p0_threshold: 0.90                # 原图匹配 (可直接开单)
  p1_threshold: 0.70                # 款式匹配 (需确认后开单)
  p2_threshold: 0.50                # 品类+风格 (仅供参考)

# ── 分布式追踪 (FIX #12, v1.3 新增) ──
tracing:
  enabled: true
  trace_id_format: "w3c"            # W3C TraceContext 标准
  propagation:
    - "traceparent"                  # HTTP header
    - "kafka-header"                 # Kafka record header
  sampling_rate: 1.0                 # 1.0 = 全采样, 生产可调为 0.1
