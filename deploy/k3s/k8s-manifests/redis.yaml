# ============================================================
# Redis 7 — StatefulSet + Sentinel (HA)
# 端口: 6379 (Redis), 26379 (Sentinel)
# NodePort: 52030 (Redis)
# 存储: 20Gi per replica
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: imgsrch-infra
  labels:
    app: redis
data:
  redis.conf: |
    # 内存限制 4GB，淘汰策略 volatile-ttl
    maxmemory 4gb
    maxmemory-policy volatile-ttl
    # 持久化
    appendonly yes
    appendfsync everysec
    # 安全
    protected-mode no
    # 复制
    min-replicas-to-write 1
    min-replicas-max-lag 10
  sentinel.conf: |
    sentinel monitor mymaster redis-0.redis-headless.imgsrch-infra.svc.cluster.local 6379 2
    sentinel down-after-milliseconds mymaster 5000
    sentinel failover-timeout mymaster 60000
    sentinel parallel-syncs mymaster 1
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: imgsrch-infra
  labels:
    app: redis
spec:
  type: NodePort
  ports:
    - port: 6379
      targetPort: 6379
      nodePort: 52030
      name: redis
  selector:
    app: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: imgsrch-infra
  labels:
    app: redis
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
    - port: 26379
      targetPort: 26379
      name: sentinel
  selector:
    app: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: imgsrch-infra
  labels:
    app: redis
spec:
  serviceName: redis-headless
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - /etc/redis/redis.conf
          resources:
            requests:
              memory: 2Gi
              cpu: "500m"
            limits:
              memory: 5Gi
              cpu: "2"
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: redis-config
              mountPath: /etc/redis
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
        - name: sentinel
          image: redis:7-alpine
          ports:
            - containerPort: 26379
              name: sentinel
          command:
            - redis-sentinel
            - /etc/redis/sentinel.conf
          resources:
            requests:
              memory: 128Mi
              cpu: "100m"
            limits:
              memory: 256Mi
              cpu: "500m"
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
      volumes:
        - name: redis-config
          configMap:
            name: redis-config
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
