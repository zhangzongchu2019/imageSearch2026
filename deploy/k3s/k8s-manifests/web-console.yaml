# ============================================================
# Web Console — Deployment
# 端口: 3000
# NodePort: 52250
# 依赖: search-service, write-service, cron-scheduler
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-console-config
  namespace: imgsrch-app
  labels:
    app: web-console
data:
  SEARCH_SERVICE_URL: http://search-service.imgsrch-app.svc.cluster.local:8080
  WRITE_SERVICE_URL: http://write-service.imgsrch-app.svc.cluster.local:8081
  CRON_SERVICE_URL: http://cron-scheduler.imgsrch-app.svc.cluster.local:8082
  PROMETHEUS_URL: http://prometheus.imgsrch-monitor.svc.cluster.local:9090
  PG_DSN: postgresql://imgsrch:imgsrch_pass@postgres.imgsrch-infra.svc.cluster.local:5432/image_search
  MILVUS_HOST: milvus-proxy.imgsrch-infra.svc.cluster.local
  MILVUS_PORT: "19530"
  UPLOAD_DIR: /tmp/imgsrch-uploads
  BATCH_MAX_SIZE: "128"
  BATCH_CONCURRENCY: "8"
---
apiVersion: v1
kind: Service
metadata:
  name: web-console
  namespace: imgsrch-app
  labels:
    app: web-console
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 52250
      name: http
  selector:
    app: web-console
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-console
  namespace: imgsrch-app
  labels:
    app: web-console
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-console
  template:
    metadata:
      labels:
        app: web-console
    spec:
      containers:
        - name: web-console
          image: imgsrch/web-console:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: web-console-config
          resources:
            requests:
              memory: 256Mi
              cpu: "250m"
            limits:
              memory: 1Gi
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
