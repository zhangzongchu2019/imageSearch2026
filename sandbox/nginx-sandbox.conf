# ============================================================
# imageSearch2026 沙箱 code-server · Nginx 反向代理
# 安装: sudo cp nginx-sandbox.conf /etc/nginx/sites-enabled/sandbox
#       sudo nginx -t && sudo systemctl reload nginx
# 访问: https://<宿主机IP>:65082
# ============================================================
server {
    listen 65082 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/code-server.crt;
    ssl_certificate_key /etc/nginx/ssl/code-server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # code-server WebSocket + HTTP
    location / {
        proxy_pass http://127.0.0.1:8443/;
        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Accept-Encoding gzip;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长连接 (Claude Code 会话可能持续很久)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 86400s;

        # 大文件上传 (批量图片导入)
        client_max_body_size 512m;
    }
}
